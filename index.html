    '<div class="card c3"><div class="ch"><div class="ct">Script src URLs</div>'+B('m',d.jsFiles.length+' files')+'</div>'+jsHtml()+'</div>'+
  '</div>'+

  '<div class="sec">Technical Details</div>'+
  '<div class="grid">'+

    '<div class="card"><div class="ch"><div class="ct">Resource Counts</div>'+B('m','INFO')+'</div>'+
      '<ul class="kv">'+
        '<li><span class="kv-k">Ext. CSS files</span><span class="kv-v">'+d.cssFiles.length+'</span></li>'+
        '<li><span class="kv-k">Ext. JS files</span><span class="kv-v">'+d.jsFiles.length+'</span></li>'+
        '<li><span class="kv-k">Inline &lt;style&gt;</span><span class="kv-v">'+d.inlineStyles+'</span></li>'+
        '<li><span class="kv-k">Inline &lt;script&gt;</span><span class="kv-v">'+d.inlineScripts+'</span></li>'+
        '<li><span class="kv-k">Preload hints</span><span class="kv-v">'+d.preloadLinks.length+'</span></li>'+
        '<li><span class="kv-k">DNS prefetch</span><span class="kv-v">'+d.dnsPrefetch.length+'</span></li>'+
      '</ul></div>'+

    '<div class="card"><div class="ch"><div class="ct">Mixed Content (HTTP on HTTPS)</div>'+(d.mixedContent.length>0?B('r',d.mixedContent.length+' issues'):B('g','CLEAN \u2713'))+'</div>'+mixedHtml()+'</div>'+

    '<div class="card"><div class="ch"><div class="ct">hreflang / Internationalization</div>'+(d.hreflang&&d.hreflang.length>0?B('g',d.hreflang.length+' tags'):B('m','NONE'))+'</div>'+hreflangHtml()+'</div>'+

  '</div>'+

  '</div>'+ /* end tab-technical */

  /* ====== SOCIAL TAB ====== */
  '<div class="tab-pane" id="tab-social">'+

  '<div class="sec">Open Graph &amp; Twitter Cards</div>'+
  '<div class="grid">'+
    '<div class="card c3"><div class="ch"><div class="ct">All Social Meta Tags</div>'+
      '<div class="bgs">'+(d.openGraph.title?B('g','OG \u2713'):B('y','OG \u2717'))+' '+(d.twitter.card?B('g','TW \u2713'):B('y','TW \u2717'))+'</div></div>'+
      socialHtml()+'</div>'+
  '</div>'+

  '<div class="sec">All Meta Tags on Page</div>'+
  '<div class="grid">'+
    '<div class="card c3"><div class="ch"><div class="ct">Complete &lt;meta&gt; tag inventory</div>'+B('m',d.allMeta.length+' tags')+'</div>'+allMetaHtml()+'</div>'+
  '</div>'+

  '</div>'; /* end tab-social */

  gid('results').innerHTML=html;
  gid('results').style.display='block';
}

/* ============================================================
   TAB SWITCHING
============================================================ */
function switchTab(name, btn){
  var panes=document.querySelectorAll('.tab-pane');
  Array.prototype.forEach.call(panes,function(p){p.classList.remove('active');});
  var active=document.getElementById('tab-'+name);
  if(active)active.classList.add('active');
  var btns=document.querySelectorAll('.tab-btn');
  Array.prototype.forEach.call(btns,function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
}

/* ============================================================
   CHECKLIST TOGGLE
============================================================ */
function toggleChk(el){
  el.classList.toggle('checked');
  var box=el.querySelector('.chk-box');
  var pri=el.querySelector('.chk-pri');
  if(el.classList.contains('checked')){
    if(box)box.textContent='\u2713';
    if(pri){
      el.setAttribute('data-pri-orig',pri.className+'||'+pri.textContent);
      pri.textContent='DONE';
      pri.className='chk-pri';
      pri.style.cssText='background:rgba(0,208,132,.1);color:var(--grn);border:1px solid rgba(0,208,132,.2)';
    }
  }else{
    if(box)box.textContent='';
    if(pri){
      var orig=(el.getAttribute('data-pri-orig')||'').split('||');
      pri.className=orig[0]||'chk-pri pri-later';
      pri.textContent=orig[1]||'LATER';
      pri.style.cssText='';
    }
  }
}


function toggleX(id){
  var el=gid(id);if(!el)return;
  var open=el.classList.toggle('open');
  var btn=el.previousElementSibling;
  if(btn&&btn.className.indexOf('xbtn')!==-1){
    btn.innerHTML=btn.innerHTML.replace(open?'&#9660;':'&#9650;',open?'&#9650;':'&#9660;');
  }
}

/* ============================================================
   EXPORT / COPY
============================================================ */
var _data=null,_url=null;

function doExport(){
  if(!_data)return;
  var blob=new Blob([JSON.stringify({url:_url,analyzedAt:new Date().toISOString(),data:_data},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='seo-security-analysis.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},5000);
}

function doCopy(){
  if(!_data)return;
  var d=_data;
  var sc=calcScore(d);
  var secSc=calcSecurityScore(d.security);
  var lines=[
    '==========================================',
    '  SEO + Security Analysis Report',
    '==========================================',
    'URL:        '+_url,
    'Date:       '+new Date().toISOString(),
    'SEO Score:  '+sc.score+'/100',
    'Sec Score:  '+secSc.score+'/100',
    '',
    '── TITLE ──────────────────────────────────',
    (d.title.content||'MISSING')+' ('+d.title.length+' chars)',
    '',
    '── META DESCRIPTION ───────────────────────',
    (d.metaDescription.content||'MISSING')+' ('+d.metaDescription.length+' chars)',
    '',
    '── SECURITY ───────────────────────────────',
    'HTTPS:      '+(d.security.isHttps?'Yes':'NO'),
    'CSP meta:   '+(d.security.cspMeta||'Not set'),
    'X-Frame:    '+(d.security.xFrameMeta||'Not set'),
    'Referrer:   '+(d.security.referrerMeta||'Not set'),
    'HSTS(meta): '+(d.security.hasHsts?'Present':'Not set'),
    'Dangerous JS:'+(d.security.dangerousJs.issues.join(',')||'None'),
    'SRI missing: '+(d.security.thirdPartyScripts.missingIntegrity),
    '',
    '── CONTENT ────────────────────────────────',
    'Words: '+d.wordCount,
    d.readability?'Readability: '+d.readability.score+'/100 ('+d.readability.grade+')':'No readability data',
    '',
    '── HEADINGS ───────────────────────────────',
    [1,2,3,4,5,6].map(function(i){return 'H'+i+': '+d.headingCounts['h'+i];}).join('  '),
  ].filter(function(l){return l!==undefined&&l!==null;}).join('\n');

  var btn=gid('copybtn');
  function restore(){if(btn)btn.textContent='\u2398 Copy';}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(lines)
      .then(function(){if(btn){btn.textContent='\u2713 Copied!';setTimeout(restore,2200);}})
      .catch(function(){fbCopy(lines);if(btn){btn.textContent='\u2713 Copied!';setTimeout(restore,2200);}});
  }else{fbCopy(lines);if(btn){btn.textContent='\u2713 Copied!';setTimeout(restore,2200);}}
}

function fbCopy(text){
  var ta=document.createElement('textarea');ta.value=text;
  ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

/* ============================================================
   MAIN
============================================================ */
function run(){
  clearErr();
  gid('results').style.display='none';
  var rawUrl=(gid('url').value||'').trim();
  var keyword=(gid('kw').value||'').trim();
  var pageUrl=normalizeUrl(rawUrl);
  if(!pageUrl){showError('<strong>Invalid URL</strong> &mdash; enter a full URL like <code>https://example.com/page</code>');return;}
  gid('url').value=pageUrl;
  var btn=gid('go');btn.disabled=true;btn.textContent='ANALYZING\u2026';
  initDots();

  var hostname='';
  try{hostname=new URL(pageUrl).hostname;}catch(e){}

  // Fetch page HTML + optional security/IP data in parallel
  var htmlPromise=fetchPage(pageUrl);
  var ipPromise=hostname?fetchIpInfo(hostname):Promise.resolve(null);

  setStatus('Fetching page & running parallel checks\u2026');

  Promise.all([htmlPromise, ipPromise])
    .then(function(results){
      var res=results[0];
      var ipData=results[1];
      setStatus('Parsing '+((res.html.length/1024).toFixed(0))+' KB of HTML\u2026');
      return new Promise(function(ok){setTimeout(function(){ok({res:res,ipData:ipData});},40);});
    })
    .then(function(obj){
      var res=obj.res;
      var ipData=obj.ipData;
      var data;
      try{data=analyze(res.html,pageUrl,keyword);}
      catch(e){throw new Error('Analysis error: '+e.message);}
      _data=data;_url=pageUrl;
      hideStatus();
      render(data,pageUrl,keyword,res.proxy,null,ipData);
      gid('results').scrollIntoView({behavior:'smooth',block:'start'});
    })
    .catch(function(e){
      hideStatus();
      showError('<strong>Failed to analyze</strong><pre>'+escH(e.message||'Unknown error')+'</pre>');
    })
    .finally(function(){btn.disabled=false;btn.textContent='ANALYZE \u2192';});
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&(e.target.id==='url'||e.target.id==='kw'))run();
});
